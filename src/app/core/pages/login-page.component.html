<div class="login-page">
  <div class="login-page__photo" aria-hidden="true"></div>

  <div class="login-page__frame">
    <header class="login-page__brand">
      <div class="login-page__logo">
        <img
          class="login-page__logo-img"
          src="/favicon.png"
          width="44"
          height="44"
          alt="Grupo Empresarial"
        />
      </div>
      <div class="login-page__brand-text">
        <span class="login-page__product">TerminalOps</span>
        <span class="login-page__tagline"
          >Login · Operaciones logísticas</span
        >
      </div>
    </header>

    <section class="login-page__card" aria-labelledby="login-heading">
      <h1 id="login-heading" class="login-page__title">Iniciar sesión</h1>
      <p class="login-page__subtitle">
        Acceso seguro. La sesión caduca a medianoche (hora local) y deberás
        volver a entrar al día siguiente.
      </p>

      <form class="login-page__form" (submit)="onSubmit($event)" novalidate>
        <to-input
          label="Correo electrónico"
          type="email"
          placeholder="correo@empresa.com"
          inputName="email"
          prefixIcon="user"
          [autocomplete]="'email'"
          [disabled]="submitting()"
        />
        <to-input
          label="Contraseña"
          type="password"
          placeholder="••••••••"
          inputName="password"
          prefixIcon="lock"
          [passwordToggle]="true"
          [autocomplete]="'current-password'"
          [disabled]="submitting()"
        />

        @if (error()) {
        <p class="login-page__error" role="alert">{{ error() }}</p>
        }

        <div class="login-page__actions">
          <to-button
            type="submit"
            variant="primary"
            [disabled]="submitting()"
            [loading]="submitting()"
          >
            Entrar
          </to-button>
        </div>
      </form>

      <p class="login-page__foot">
        ¿No tienes cuenta?
        <a routerLink="/register" class="login-page__link"
          >Regístrate con invitación</a
        >
      </p>
    </section>

    <p class="login-page__legal">© {{ currentYear }} AXOLOTL TECHNOLOGY</p>
  </div>
</div>
