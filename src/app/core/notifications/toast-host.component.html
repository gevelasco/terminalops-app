@if (toast.items().length > 0) {
  <div class="toast-host" aria-live="polite" aria-relevant="additions">
    @for (item of toast.items(); track item.id) {
      <div [class]="variantClass(item.variant)" role="status">
        <span class="toast-host__icon" aria-hidden="true">
          @switch (item.variant) {
            @case ('info') {
              <svg width="28" height="28" viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"
                />
              </svg>
            }
            @case ('success') {
              <svg width="28" height="28" viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
                />
              </svg>
            }
            @case ('warning') {
              <svg width="28" height="28" viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"
                />
              </svg>
            }
            @case ('error') {
              <svg width="28" height="28" viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"
                />
              </svg>
            }
          }
        </span>
        <div class="toast-host__body">
          <span class="toast-host__title">{{ titleFor(item.variant) }}</span>
          <span class="toast-host__msg">{{ item.message }}</span>
        </div>
        <button
          type="button"
          class="toast-host__close"
          [attr.aria-label]="'Cerrar'"
          (click)="toast.dismiss(item.id)"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
            />
          </svg>
        </button>
      </div>
    }
  </div>
}
