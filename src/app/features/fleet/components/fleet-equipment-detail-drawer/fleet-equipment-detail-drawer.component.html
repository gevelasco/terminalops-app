<div
  class="fleet-drawer"
  role="dialog"
  aria-modal="true"
  aria-labelledby="fleet-eq-detail-title"
>
  <button
    type="button"
    class="fleet-drawer__backdrop"
    aria-label="Cerrar panel"
    (click)="dismiss.emit()"
  ></button>

  <aside class="fleet-drawer__panel">
    <header class="fleet-drawer__header">
      <h2 id="fleet-eq-detail-title" class="fleet-drawer__title">
        <svg
          class="fleet-drawer__title-icon"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4zM3.9 7.5l2.8 2.8-1.3 1.3c-.4.4-1 .4-1.4 0L2.5 9.1c-.4-.4-.4-1 0-1.4l1.4-1.2zm3.6 3.6L19 6l1 1-11.5 11.5-1-1zm12.8 6.7l-1.4 1.4-7.1-7.1 1.4-1.4 7.1 7.1z"
          />
        </svg>
        Equipo (vista)
      </h2>
      <to-icon-button label="Cerrar" type="button" (click)="dismiss.emit()">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
          />
        </svg>
      </to-icon-button>
    </header>

    <div class="fleet-drawer__body fleet-eq-detail">
      <dl class="fleet-eq-detail__dl">
        <div class="fleet-eq-detail__row">
          <dt>ID</dt>
          <dd>{{ equipment().id }}</dd>
        </div>
        <div class="fleet-eq-detail__row">
          <dt>Unidad</dt>
          <dd>{{ unitLabel() }} ({{ equipment().unitId }})</dd>
        </div>
        <div class="fleet-eq-detail__row">
          <dt>Nombre</dt>
          <dd>{{ equipment().name }}</dd>
        </div>
        <div class="fleet-eq-detail__row">
          <dt>Serie</dt>
          <dd>{{ equipment().serialNumber }}</dd>
        </div>
        @if (equipment().axleConfiguration) {
          <div class="fleet-eq-detail__row">
            <dt>Ejes</dt>
            <dd>{{ equipment().axleConfiguration }}</dd>
          </div>
        }
        <div class="fleet-eq-detail__row">
          <dt>Último servicio</dt>
          <dd>{{ equipment().lastServiceDate }}</dd>
        </div>
      </dl>
    </div>
  </aside>
</div>
