<to-side-drawer
  titleId="fleet-unit-detail-title"
  wide
  headerClass="fleet-unit-detail__header"
  bodyClass="fleet-unit-body fleet-unit-detail"
  [loading]="vm.drawerLoading()"
  skeletonVariant="detail"
  (dismiss)="vm.requestDismiss()"
>
  <div toSideDrawerHeader class="fleet-unit-detail__header-text">
    <h2
      id="fleet-unit-detail-title"
      class="to-side-drawer__title fleet-unit-detail__title"
    >
      <to-icon class="to-side-drawer__title-icon" name="unit" [size]="22" />
      <span class="fleet-unit-detail__title-id">{{ vm.trailerOperationalId() }}</span>
    </h2>
    <to-status-pill
      [label]="vm.statusBanner().label"
      [sub]="vm.statusBanner().sub"
      [modClass]="vm.statusBanner().mod"
    />
  </div>

  <to-segment-control
    layout="drawer"
    ariaLabel="Secciones del detalle de unidad"
    [tabs]="vm.detailSegmentTabs"
    [activeId]="vm.detailTab()"
    (tabSelect)="vm.selectDetailTab($event)"
  />

  @switch (vm.detailTab()) {
    @case ('ficha') {
      <app-fleet-unit-detail-ficha-tab />
    }
    @case ('mant') {
      <app-fleet-unit-detail-mant-tab />
    }
    @case ('cob') {
      <app-fleet-unit-detail-cob-tab />
    }
  }
</to-side-drawer>
