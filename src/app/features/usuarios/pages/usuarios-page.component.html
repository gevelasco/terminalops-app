<to-page-header
  title="Usuarios"
  subtitle="Administra el acceso por módulo del equipo operativo."
>
  @if (!loading()) {
    <to-button type="button" variant="primary" (click)="newUserOpen.set(true)">
      <span class="usuarios-page-header__btn-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4zm5 3v-2h-2v2h-2v2h2v2h2v-2h2v-2h-2z"
          />
        </svg>
      </span>
      Nuevo usuario
    </to-button>
  }
</to-page-header>

@if (newUserOpen()) {
  @defer {
    <app-usuarios-new-drawer
      (dismiss)="newUserOpen.set(false)"
      (saved)="onUserCreated()"
    />
  }
}

@if (selectedUser(); as user) {
  @defer {
    <app-usuarios-detail-drawer
      [user]="user"
      (dismiss)="onDetailDismiss()"
      (saved)="onUserSaved($event)"
    />
  }
}

@if (loading()) {
  <to-skeleton [lines]="5" />
} @else {
  <div class="usuarios-table-block">
    <to-table
      [columns]="columns"
      [rows]="tableRows()"
      [interactiveRows]="true"
      (rowClick)="onRowClick($event)"
    />
  </div>
}
