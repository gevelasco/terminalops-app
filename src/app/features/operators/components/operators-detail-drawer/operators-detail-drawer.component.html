<to-side-drawer
  titleId="operators-detail-title"
  wide
  headerClass="fleet-unit-detail__header"
  bodyClass="fleet-unit-body fleet-unit-detail"
  [loading]="vm.drawerLoading()"
  skeletonVariant="detail"
  (dismiss)="vm.requestDismiss()"
>
  <div toSideDrawerHeader class="fleet-unit-detail__header-text">
    <h2
      id="operators-detail-title"
      class="to-side-drawer__title fleet-unit-detail__title"
    >
      <to-icon class="to-side-drawer__title-icon" name="person" [size]="22" />
      {{ vm.operator().name }}
    </h2>
    <div class="operators-detail__status-row">
      <to-status-pill
        [label]="vm.operationalStatusLabel()"
        [modClass]="vm.operatorStatusMod()"
      />
      @if (vm.showsHrHoldActions()) {
        <div class="operators-detail__hr-actions">
          @if (vm.showsStartLeaveAction()) {
            <button
              type="button"
              class="maniobra-detail__maintenance-btn"
              [disabled]="vm.hrHoldSubmitting()"
              (click)="vm.startOperatorLeave()"
            >
              Vacaciones
            </button>
          }
          @if (vm.showsStartIncapacitatedAction()) {
            <button
              type="button"
              class="maniobra-detail__maintenance-btn"
              [disabled]="vm.hrHoldSubmitting()"
              (click)="vm.startOperatorIncapacitated()"
            >
              Incapacidad
            </button>
          }
          @if (vm.showsEndHrHoldAction()) {
            <button
              type="button"
              class="maniobra-detail__maintenance-btn"
              [disabled]="vm.hrHoldSubmitting()"
              (click)="vm.endOperatorHrHold()"
            >
              Reincorporar
            </button>
          }
        </div>
      }
    </div>
  </div>

  <to-segment-control
    layout="drawer"
    ariaLabel="Secciones del operador"
    [tabs]="vm.drawerSegmentTabs"
    [activeId]="vm.drawerTab()"
    (tabSelect)="vm.selectDrawerTab($event)"
  />

  @switch (vm.drawerTab()) {
    @case ('details') {
      <app-operators-detail-details-tab />
    }
    @case ('operation') {
      <app-operators-detail-operation-tab />
    }
  }
</to-side-drawer>
