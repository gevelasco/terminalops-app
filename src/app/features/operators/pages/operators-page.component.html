<to-page-header title="Operadores" subtitle="Personal certificado">
  @if (!loading()) {
  <to-button
    type="button"
    variant="primary"
    (click)="newOperatorOpen.set(true)"
  >
    <span class="operators-page-header__btn-icon" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path
          fill="currentColor"
          d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4zm5 3v-2h-2v2h-2v2h2v2h2v-2h2v-2h-2z"
        />
      </svg>
    </span>
    Nuevo operador
  </to-button>
  }
</to-page-header>

@if (newOperatorOpen()) {
  @defer {
    <app-operators-new-drawer
      (dismiss)="newOperatorOpen.set(false)"
      (saved)="onOperatorCreated($event)"
    />
  }
}

@if (operatorsFeature.selectedOperator()) {
  @defer {
    <app-operators-detail-drawer (dismiss)="onDetailDismiss()" />
  }
}

@if (loading()) {
  <to-skeleton [lines]="4" />
} @else {
  <div class="operators-toolbar">
    <div class="operators-toolbar__search">
      <to-input
        type="search"
        prefixIcon="search"
        ariaLabel="Buscar en el listado de operadores"
        placeholder="Nombre, licencia, vigencia, estado, cobertura, id…"
        [(value)]="searchQuery"
      />
    </div>
  </div>
  <div class="operators-table-block">
    <to-table
      [columns]="columns"
      [rows]="displayedOperatorRows()"
      [interactiveRows]="true"
      (rowClick)="onRowClick($event)"
    />
  </div>
}
