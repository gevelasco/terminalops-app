<div class="destination-rate-location-fields__stack">
  <to-input
    label="CP destino"
    placeholder="Ej. 77560"
    [maxLength]="5"
    inputName="destinationRatePostalCode"
    autocomplete="postal-code"
    [(value)]="postalCode"
    [disabled]="disabled()"
    (blurNotify)="onCpBlur()"
  />
  @if (cpLoading()) {
    <p class="destination-rate-location-fields__hint" aria-live="polite">
      Consultando catálogo postal…
    </p>
  }
  <to-input
    label="Ciudad / municipio"
    placeholder="—"
    [disabled]="true"
    [displayValue]="cityLine()"
  />
  @if (cpEditing() && localityOptions().length > 0) {
    <to-select
      label="Localidad"
      placeholder="Elige localidad en la lista"
      [options]="localityOptions()"
      [value]="settlementConsId()"
      [disabled]="disabled()"
      (valueChange)="onLocalityChange($event)"
    />
  } @else if (localityLabel()) {
    <to-input
      label="Localidad"
      [disabled]="true"
      [displayValue]="localityLabel()"
    />
  } @else {
    <to-input label="Localidad" [disabled]="true" displayValue="—" />
  }
</div>
