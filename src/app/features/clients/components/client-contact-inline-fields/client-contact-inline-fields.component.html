<div class="client-contact-inline-fields__grid">
  <to-input
    label="Nombre *"
    placeholder="Nombre completo"
    [(value)]="contactName"
  />
  <to-input
    label="Cargo / área"
    placeholder="Ej. Cuentas por pagar"
    [(value)]="contactRole"
  />
  <to-input
    label="Teléfono"
    placeholder="Opcional"
    [(value)]="contactPhone"
  />
  <to-input
    label="Correo"
    type="email"
    placeholder="Opcional"
    [(value)]="contactEmail"
  />
</div>
