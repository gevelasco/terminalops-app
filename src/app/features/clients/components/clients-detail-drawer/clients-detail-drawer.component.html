<to-side-drawer
  titleId="clients-detail-title"
  wide
  headerClass="fleet-unit-detail__header"
  bodyClass="fleet-unit-body fleet-unit-detail"
  [loading]="vm.drawerLoading()"
  skeletonVariant="detail"
  (dismiss)="vm.requestDismiss()"
>
  <div toSideDrawerHeader class="fleet-unit-detail__header-text">
    <h2
      id="clients-detail-title"
      class="to-side-drawer__title fleet-unit-detail__title"
    >
      <to-icon class="to-side-drawer__title-icon" name="client" [size]="22" />
      {{ vm.client().name }}
    </h2>
    <to-status-pill
      [label]="vm.healthSummary()"
      [modClass]="vm.commercialHealthStatusMod()"
    />
  </div>

  <to-segment-control
    layout="drawer"
    ariaLabel="Secciones del cliente"
    [tabs]="vm.drawerSegmentTabs"
    [activeId]="vm.drawerTab()"
    (tabSelect)="vm.selectDrawerTab($event)"
  />

  @switch (vm.drawerTab()) {
    @case ('details') {
      <app-clients-detail-details-tab />
    }
    @case ('balance') {
      <app-clients-detail-balance-tab />
    }
  }
</to-side-drawer>
