<to-page-header
  title="Clientes"
  subtitle="Catálogo para maniobras y expediente comercial"
>
  @if (!loading()) {
    <to-button
      type="button"
      variant="primary"
      (click)="newClientOpen.set(true)"
    >
      <span class="clients-page-header__btn-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M12 2c-4.97 0-9 4.03-9 9 0 4.17 2.84 7.67 6.69 8.69L12 22l2.31-2.31C18.16 18.67 21 15.17 21 11c0-4.97-4.03-9-9-9zm0 2c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.3c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"
          />
        </svg>
      </span>
      Nuevo cliente
    </to-button>
  }
</to-page-header>

@if (newClientOpen()) {
  <app-clients-new-drawer
    (dismiss)="newClientOpen.set(false)"
    (saved)="onClientCreated($event)"
  />
}

@if (detailClient(); as cli) {
  <app-clients-detail-drawer
    [client]="cli"
    (dismiss)="onDetailDismiss()"
    (clientChange)="onDetailClientChange($event)"
  />
}

@if (loading()) {
  <to-skeleton [lines]="4" />
} @else {
  <div class="clients-toolbar">
    <div class="clients-toolbar__search">
      <to-input
        type="search"
        prefixIcon="search"
        ariaLabel="Buscar en el listado de clientes"
        placeholder="Nombre, RFC, estatus, maniobras, id…"
        [(value)]="searchQuery"
      />
    </div>
  </div>
  <div class="clients-table-block">
    <to-table
      [columns]="columns"
      [rows]="displayedClientRows()"
      [interactiveRows]="true"
      (rowClick)="onRowClick($event)"
    />
  </div>
}
