<div class="reports-shell" aria-label="Filtros y secciones de reportes">
  <div class="reports-shell__tabs" aria-label="Sección de reporte">
    <to-segment-control
      layout="toolbar"
      ariaLabel="Sección de reporte"
      [tabs]="tabs()"
      [activeId]="tab()"
      (tabSelect)="selectTab($event)"
    />
  </div>

  <section class="reports-shell__filters" aria-label="Filtros del reporte">
    <div class="reports-shell__field reports-shell__field--period">
      <div class="reports-shell__period-controls">
        <select
          class="reports-shell__control reports-shell__period-select reports-shell__period-select--month to-field__control"
          aria-label="Mes del reporte"
          [ngModel]="filter().periodMonth"
          (ngModelChange)="onMonthChange($event)"
          [ngModelOptions]="{ standalone: true }"
        >
          @for (opt of monthOptions(); track opt.value) {
            <option [ngValue]="opt.value">{{ opt.label }}</option>
          }
        </select>
        <select
          class="reports-shell__control reports-shell__period-select reports-shell__period-select--year to-field__control"
          aria-label="Año del reporte"
          [ngModel]="filter().periodYear"
          (ngModelChange)="onYearChange($event)"
          [ngModelOptions]="{ standalone: true }"
        >
          @for (year of yearOptions(); track year) {
            <option [ngValue]="year">{{ year }}</option>
          }
        </select>
        <span class="reports-shell__period-calendar-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24">
            <path
              fill="currentColor"
              d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"
            />
          </svg>
        </span>
      </div>
    </div>

    <div class="reports-shell__clients-group">
      <div class="reports-shell__field reports-shell__field--clients">
        <span class="reports-shell__label" id="reports-clients-label">
          <span class="reports-shell__label-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
              />
            </svg>
          </span>
          Cliente
        </span>
        <to-clients-multi-input
          class="reports-shell__control"
          aria-labelledby="reports-clients-label"
          [clientIds]="filter().clientIds"
          (clientIdsChange)="patch({ clientIds: $event })"
        />
      </div>

      <div class="reports-shell__field reports-shell__field--payment-methods">
        <span class="reports-shell__label" id="reports-payment-label">
          <span class="reports-shell__label-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"
              />
            </svg>
          </span>
          Forma
        </span>
        <to-payment-methods-multi-input
          class="reports-shell__control"
          aria-labelledby="reports-payment-label"
          [methods]="filter().clientPaymentMethods"
          (methodsChange)="patch({ clientPaymentMethods: $event })"
        />
      </div>
    </div>
  </section>
</div>
