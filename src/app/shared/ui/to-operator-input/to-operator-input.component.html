<div class="to-operator-input">
  @if (label()) {
    <label class="to-operator-input__label" [attr.for]="inputId">{{ label() }}</label>
  }
  <div
    class="to-operator-input__wrap"
    [class.to-operator-input__wrap--open]="open()"
  >
    <input
      #fieldInput
      [id]="inputId"
      class="to-operator-input__control"
      type="text"
      [placeholder]="placeholder()"
      [value]="inputText()"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onControlBlur()"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      aria-autocomplete="list"
      [attr.aria-expanded]="open()"
      [attr.aria-controls]="open() ? listId : null"
    />
    @if (loading()) {
      <span class="to-operator-input__spinner" aria-hidden="true"></span>
    }
    @if (open() && !loading()) {
      <ul [id]="listId" class="to-operator-input__list" role="listbox">
        @if (suggestions().length > 0) {
          @for (op of suggestions(); track op.id) {
            <li
              class="to-operator-input__item"
              role="option"
              tabindex="-1"
              (pointerdown)="onPickPointerDown(op, $event)"
            >
              {{ op.name }}
            </li>
          }
        } @else {
          <li class="to-operator-input__empty" role="presentation">
            No hay operadores disponibles (en maniobra o no activos).
          </li>
        }
      </ul>
    }
  </div>
</div>
