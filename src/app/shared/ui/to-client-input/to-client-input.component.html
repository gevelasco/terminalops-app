<div class="to-client-input">
  @if (label()) {
    <label class="to-client-input__label" [attr.for]="inputId">{{ label() }}</label>
  }
  <div
    class="to-client-input__wrap"
    [class.to-client-input__wrap--open]="open()"
  >
    <span class="to-client-input__search" aria-hidden="true">
      <svg class="to-client-input__search-svg" width="18" height="18" viewBox="0 0 24 24">
        <path
          fill="currentColor"
          d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
        />
      </svg>
    </span>
    <input
      #fieldInput
      [id]="inputId"
      class="to-client-input__control"
      type="text"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="disabled()"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onControlBlur()"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      aria-autocomplete="list"
      [attr.aria-expanded]="open()"
      [attr.aria-controls]="open() ? listId : null"
    />
    @if (loading()) {
      <span class="to-client-input__spinner" aria-hidden="true"></span>
    }
    @if (open() && suggestions().length > 0) {
      <ul [id]="listId" class="to-client-input__list" role="listbox">
        @for (c of suggestions(); track c.id) {
          <li
            class="to-client-input__item"
            role="option"
            tabindex="-1"
            (pointerdown)="onPickPointerDown(c, $event)"
          >
            {{ c.name }}
          </li>
        }
      </ul>
    }
  </div>
</div>
