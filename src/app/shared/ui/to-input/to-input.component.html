<div class="to-field">
  @if (label()) {
    <label class="to-field__label" [attr.for]="id()">{{ label() }}</label>
  }
  <div
    class="to-field__control-row"
    [class.to-field__control-row--group]="hasAffix()"
    [class.to-field__control-row--error]="error() && hasAffix()"
  >
    @switch (prefixIcon()) {
      @case ('search') {
        <span
          class="to-field__affix to-field__affix--prefix to-field__affix--icon"
          aria-hidden="true"
        >
          <svg class="to-field__prefix-svg" width="18" height="18" viewBox="0 0 24 24">
            <path
              fill="currentColor"
              d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
            />
          </svg>
        </span>
      }
      @case ('user') {
        <span
          class="to-field__affix to-field__affix--prefix to-field__affix--icon"
          aria-hidden="true"
        >
          <svg class="to-field__prefix-svg" width="18" height="18" viewBox="0 0 24 24">
            <path
              fill="currentColor"
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
            />
          </svg>
        </span>
      }
      @case ('lock') {
        <span
          class="to-field__affix to-field__affix--prefix to-field__affix--icon"
          aria-hidden="true"
        >
          <svg class="to-field__prefix-svg" width="18" height="18" viewBox="0 0 24 24">
            <path
              fill="currentColor"
              d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10z"
            />
          </svg>
        </span>
      }
    }
    @if (prefixIcon() === 'none' && prefix()?.trim()) {
      <span class="to-field__affix to-field__affix--prefix" aria-hidden="true">{{
        prefix()
      }}</span>
    }
    <input
      class="to-field__control"
      [class.to-field__control--invalid]="error()"
      [class.to-field__control--affixed]="hasAffix()"
      [attr.id]="id()"
      [attr.name]="inputName() ?? null"
      [attr.type]="effectiveType()"
      [attr.placeholder]="placeholder() ?? null"
      [attr.autocomplete]="autocomplete() ?? null"
      [attr.aria-label]="label() ? null : (ariaLabel() ?? null)"
      [attr.min]="min() ?? null"
      [attr.max]="max() ?? null"
      [disabled]="disabled()"
      [value]="value()"
      (input)="onInput($event)"
      (blur)="onBlur()"
      [attr.aria-invalid]="error() ? true : null"
      [attr.aria-describedby]="error() ? id() + '-err' : null"
    />
    @if (showPasswordReveal()) {
      <button
        type="button"
        class="to-field__suffix-btn"
        tabindex="-1"
        [attr.aria-label]="
          passwordVisible() ? 'Ocultar contraseña' : 'Mostrar contraseña'
        "
        [attr.aria-pressed]="passwordVisible()"
        [disabled]="disabled()"
        (click)="togglePasswordVisible($event)"
      >
        @if (passwordVisible()) {
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
            <circle cx="12" cy="12" r="3" />
            <path d="m2 2 20 20" />
          </svg>
        } @else {
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        }
      </button>
    }
    @if (suffix()?.trim()) {
      <span class="to-field__affix to-field__affix--suffix" aria-hidden="true">{{
        suffix()
      }}</span>
    }
  </div>
  @if (error()) {
    <p class="to-field__error" [attr.id]="id() + '-err'" role="alert">{{ error() }}</p>
  }
</div>
